<!DOCTYPE html>
<html>

<head>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .video-bg iframe {
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            /* không cho click */
        }
    </style>
</head>

<body>

    <div class="video-bg">
        <iframe
            src="https://www.youtube.com/embed/Ia4VP_PfTK0?autoplay=1&mute=1&controls=0&loop=1&playlist=Ia4VP_PfTK0&modestbranding=1&showinfo=0"
            frameborder="0" allow="autoplay; fullscreen">
        </iframe>
    </div>

    <h1 style="color:white;position:relative">Content website ở đây</h1>

</body>

</html>
